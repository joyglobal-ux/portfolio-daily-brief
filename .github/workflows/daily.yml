name: Daily Brief

on:
  # 22:00 UTC Sun-Thu = 07:00 KST Mon-Fri (한국 평일 아침).
  # 한국 공휴일은 main.py가 자체 체크해서 스킵.
  schedule:
    - cron: "0 22 * * 0-4"
  # 수동 실행 가능
  workflow_dispatch:

permissions:
  contents: write  # output/ 커밋용
  pages: write
  id-token: write

concurrency:
  group: daily-brief
  cancel-in-progress: false

# Node.js 24로 강제 실행 (2026-06-02 default 전환 대비)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync

      - name: Generate brief
        env:
          GOOGLE_SHEETS_CSV_URL: ${{ secrets.GOOGLE_SHEETS_CSV_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
          CLAUDE_MODEL: ${{ vars.CLAUDE_MODEL || 'claude-sonnet-4-5-20250929' }}
        run: uv run python -m scripts.main

      - name: Commit output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add output/
          if git diff --staged --quiet; then
            echo "변경 사항 없음."
          else
            git commit -m "chore: daily brief $(date -u +%Y-%m-%d)"
            git push
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: output/

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
